# Render Blueprint (https://render.com/docs/blueprint-spec)
# Deploy: connect this repo in the Render dashboard and select "Apply Blueprint",
# or configure the API service manually with Root Directory = apps/api.
services:
  - type: web
    name: event-rsvp-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: COOKIE_NAME
        value: event_rsvp_token
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: RSVP_RATE_LIMIT_MAX
        value: "20"
      - key: RSVP_RATE_LIMIT_WINDOW_MS
        value: "900000"
